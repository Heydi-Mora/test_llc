<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MORA Growth Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family: Inter, sans-serif; background:#fcfafb; color:#1d1720; }
    h1,h2,h3 { font-family: "Playfair Display", serif; color:#2b1b24; }
    .container { width:90%; max-width:1100px; margin:auto; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; }
    header img { width:150px; }
    nav a { margin-left:15px; text-decoration:none; color:#2b1b24; font-weight:600; }
    .hero { padding:60px 0; }
    .btn { background:#2b1b24; color:white; padding:12px 20px; border-radius:30px; text-decoration:none; display:inline-block; margin-top:10px; }
    section { padding:60px 0; }
    .card { background:white; padding:20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
    form input, form textarea, form select { width:100%; padding:12px; margin-top:5px; border-radius:10px; border:1px solid #ccc; }
    form label { font-weight:600; display:block; margin-top:10px; }
    footer { padding:40px 0; text-align:center; }
  </style>
</head>

<body>

<header class="container">
  <img src="logo.png">
  <nav>
    <a href="#services">Services</a>
    <a href="#book">Book</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero container">
  <h1>Clear insights.<br><em>Meaningful</em> impact.</h1>
  <p>We help businesses turn data into strategy and growth.</p>
</section>

<section id="services" class="container">
  <h2>Services</h2>
  <div class="card">
    <p>Analytics audits, dashboards, and growth strategy support.</p>
  </div>
</section>

<section id="book" class="container">
  <h2>Book a strategy call</h2>
  <div class="card">
    <iframe 
      src="https://cal.com/heydi/strategy-call"
      width="100%"
      height="700"
      style="border-radius:16px;">
    </iframe>
  </div>
</section>

<section id="contact" class="container">
  <h2>Contact</h2>

  <div class="card">
    <form id="contactForm">

      <label>Name
        <input name="name" required>
      </label>

      <label>Email
        <input name="email" required>
      </label>

      <label>Phone
        <input name="phone" required>
      </label>

      <label>Company
        <input name="company">
      </label>

      <label>Service
        <select name="service">
          <option>Analytics audit</option>
          <option>Dashboard design</option>
        </select>
      </label>

      <label>Message
        <textarea name="message"></textarea>
      </label>

      <button class="btn">Send</button>
      <p id="formStatus"></p>

    </form>
  </div>
</section>

<footer>
  <p>MORA Growth Analytics LLC</p>
  <p>hello@moragrowth.com</p>
</footer>

<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(form));

  await fetch("https://script.google.com/macros/s/AKfycbyOjhohErPrIcokrfoJwio-YLWEAFfRs51vbAHnmKRBTWhCdYBEZA3_Pq_rEFSTGOz2/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  window.location.href = "thank-you.html";
});
</script>

</body>
</html>
