<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | MORA Growth Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: Inter, sans-serif;
      background:#fcfafb;
      color:#1d1720;
      text-align:center;
      padding:20px;
    }

    .card {
      background:white;
      padding:40px;
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
      max-width:500px;
      width:100%;
    }

    img {
      width:160px;
      margin-bottom:20px;
    }

    h1 {
      font-family: "Playfair Display", serif;
      color:#2b1b24;
      font-size:2.5rem;
      margin-bottom:10px;
    }

    p {
      font-size:1.1rem;
      margin-bottom:20px;
    }

    .btn {
      background:#2b1b24;
      color:white;
      padding:12px 20px;
      border-radius:30px;
      text-decoration:none;
      display:inline-block;
      font-weight:600;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="logo.png" alt="MORA logo">

    <h1>Thank you.</h1>

    <p>Your message has been received.</p>
    <p>We’ll review your request and get back to you shortly.</p>

    <a class="btn" href="/">Return to homepage</a>
  </div>

</body>
</html>
